services:
  postgres:
    image: postgres:16
    container_name: certpilot-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: certpilot
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: certpilot_dev
    ports:
      - "5440:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certpilot -d certpilot_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
